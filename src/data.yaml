researchAreas:
- id: 1
  title: Tactile Sensing
  description: Developing a broad range of tactile sensors (vision-based, force/pressure, multimodal, and more) to give robots rich touch perception for dexterous manipulation and physical interaction.
  image: /images/research-tactile-sensing.jpg
- id: 2
  title: Dexterous Manipulation
  description: Creating algorithms and control strategies for multi-fingered robotic hands to perform intricate tasks such as in-hand manipulation and tool use.
  image: /images/research-dexterous-manipulation.jpg
- id: 3
  title: Embodied AI & Teleoperation
  description: Building systems for intuitive human-robot teleoperation and collecting high-quality embodied data to train robust robotic policies.
  image: /images/research-embodied-ai-teleoperation.jpg
openings:
- id: 1
  title: Master / PhD Students (Fall 2026 or Fall 2027)
  type: Master / PhD Program
  description: 实验室每年约招收2-3名硕士/博士生，且有和北京通用人工智能研究院联培机会。我们欢迎对机器人与人工智能方向的最前沿、最有挑战性的研究课题感兴趣的同学加入。请发邮件详询。
  requirements:
  - Bachelor's or Master's degree in CS, EE, ME, or related fields.
  - Willing to conduct challenging top-tier research in robotics and AI.
  - Tactile sensor, manipulation, computer vision experience is a plus.
- id: 2
  title: Research Assistants / Interns
  type: Internship
  description: 我们接收每年2-3名有志于从事机器人研究的本校实习生，以及希望在本实验室开展科研并在未来攻读博士学位的外访学生。你将与实验室成员紧密合作，参与前沿机器人课题研究。请发邮件详询。
  requirements:
  - Self-motivated and passionate about robotics.
  - Experience in relevant competitions or prerequisite coursework in robotics, AI, electronics, mechanical engineering, or related fields.
  - Commitment of at least 15 hours per week.
